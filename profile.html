<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>🧠( 👁️ _ 👁️ )⚡️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;900&display=swap');

    :root {
      --unicorn-pink: #f9c5d1;
      --unicorn-blue: #a6d0e4;
      --unicorn-purple: #c1a3e4;
      --unicorn-yellow: #fbe88b;
      --unicorn-green: #a8f0c6;
      --text-color: #4a2e5e;
      --card-bg: rgba(255 255 255/0.8);
      --shadow-color: rgba(201, 167, 255, 0.6);
      --background-gradient: linear-gradient(135deg, var(--unicorn-pink), var(--unicorn-blue), var(--unicorn-purple), var(--unicorn-yellow), var(--unicorn-green));
    }

    html, body {
      height: 100%; margin: 0;
      font-family: 'Baloo 2', cursive, sans-serif;
      background: var(--background-gradient);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      overflow-x: hidden; user-select: none;
      color: var(--text-color);
      position: relative;
    }

    /* 🧠と⚡️を150個 */
    .brain-particle {
      position: fixed; user-select: none; pointer-events: none;
      font-size: 2.2rem; opacity: 0.1;
      animation-name: floatParticle;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      animation-direction: alternate;
      z-index: 0;
      will-change: transform, opacity;
    }
    @keyframes floatParticle {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.08; }
      50% { transform: translateY(-40px) translateX(20px) rotate(15deg); opacity: 0.25; }
      100% { transform: translateY(0) translateX(0) rotate(-15deg); opacity: 0.08; }
    }

    .mystery-text {
      position: fixed; top: 10vh; left: 50%;
      transform: translateX(-50%);
      font-size: 1.2rem; letter-spacing: 0.3em;
      opacity: 0.1; font-weight: 700;
      white-space: nowrap;
      animation: flicker 3s infinite alternate;
      z-index: 1;
    }
    .glow {
      text-shadow: 0 0 8px #fff, 0 0 16px #ffcc00, 0 0 24px #ff9900;
    }
    @keyframes flicker {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.25; }
    }

    .profile-card {
      max-width: 420px; margin: 15vh auto 40px;
      background: var(--card-bg);
      border-radius: 20px; padding: 25px 35px;
      box-shadow: 0 0 30px var(--shadow-color);
      backdrop-filter: blur(10px);
      text-align: center; z-index: 5;
      position: relative;
    }

    /* 💖 戻る細工：顔をリンクに */
    .profile-card h1 {
      font-size: 2.8rem;
      margin-bottom: 0.2em;
      text-shadow: 0 0 8px var(--unicorn-purple);
    }
    .home-link {
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      display: inline-block;
      transition: transform 0.2s;
    }
    .home-link:hover { transform: scale(1.1); }

    .profile-card p {
      margin: 8px 0;
      font-weight: 600;
      font-size: 1.15rem;
    }
    .profile-label {
      font-weight: 900;
      color: var(--unicorn-purple);
      margin-right: 8px;
    }

    #days-until-birthday {
      font-weight: 700;
      font-size: 1rem;
      background: linear-gradient(90deg, #ffc0cb, #a6d0e4, #c1a3e4, #fbe88b, #a8f0c6);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: rainbowShift 5s linear infinite;
    }

    @keyframes rainbowShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .cloud {
      position: fixed; bottom: 12vh; left: 50%;
      width: 240px; height: 90px;
      background: var(--background-gradient);
      border-radius: 50% / 100%;
      filter: drop-shadow(0 0 10px #fff7ff);
      animation: floatCloud 5s ease-in-out infinite;
      cursor: pointer; z-index: 10;
      box-shadow: 20px 10px 10px rgba(255 255 255 0.7), 40px 5px 10px rgba(255 255 255 0.7), 60px 20px 10px rgba(255 255 255 0.7);
    }
    @keyframes floatCloud {
      0%, 100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
      50% { transform: translateX(-50%) translateY(-25px) rotate(6deg); }
    }

    #summon-log {
      position: fixed; top: 15vh; right: 20px;
      width: 380px; max-height: 70vh;
      overflow-y: auto;
      background: rgba(255 255 255 / 0.65);
      border-radius: 16px; padding: 15px 20px;
      box-shadow: 0 0 15px var(--shadow-color);
      font-family: monospace; font-size: 0.9rem; z-index: 7;
      backdrop-filter: blur(5px);
    }
    #summon-log div {
      margin-bottom: 8px; border-bottom: 1px dashed rgba(201, 167, 255, 0.3);
      padding-bottom: 4px;
    }

    .floating-emoji {
      position: fixed; font-size: 8rem;
      pointer-events: none; animation: floatUp 1s forwards ease-out;
      z-index: 20;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-120px) scale(2.8) rotate(20deg); }
    }

    body.ritual-glow { animation: ritualGlow 0.5s ease forwards; }
    @keyframes ritualGlow {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.3) saturate(1.3); }
      100% { filter: brightness(1); }
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @media (max-width: 1100px) {
      #summon-log {
        position: relative; width: 90%; max-width: 420px;
        margin: 40px auto 100px; right: auto; top: auto;
      }
    }
  </style>
</head>
<body>
  <div class="mystery-text">★☆あ、ありがてえっ…！ｷﾝｯｷﾝに冷えてやがるッ!!!!悪魔的だぁ〜！☆★</div>
  <div class="profile-card">
    <a href="index.html" class="home-link"><h1>⚡️( 👁️ _ 👁️ )⚡️</h1></a>
    <p><span class="profile-label">名前：</span>⚡️にーとの輝星⚡️</p>
    <p><span class="profile-label">出自：</span>🇯🇵✖️🇨🇭</p>
    <p><span class="profile-label">分類：</span>普通の無職</p>
    <p><span class="profile-label">属性：</span>お絵描きオタク</p>
    <p><span class="profile-label">性別：</span>雌♀（染色体はXX）</p>
    <p><span class="profile-label">誕生日：</span>6月15日</p>
    <p><span class="profile-label">年齢：</span><span id="age-value">計算中...</span></p>
    <p><span class="profile-label">生年：</span>紀元前249997975年</p>
    <p><span class="profile-label">座右の銘：</span>無の連結定理</p>
    <p><span class="profile-label">誕生日まで：</span><br><span id="days-until-birthday">計算中...</span></p>
  </div>
  <div class="cloud"></div>
  <div id="summon-log"><strong>召喚ログ</strong><br></div>

  <script>
    (() => {
      const summons = [
        { emoji: '🍺', label: '電子ビール', poems: ["とりあえず飲めよ（　´_ゝ`）。","ほら、冷えてんだからさァ（　´_ゝ`）","冷凍庫に缶入れてんの忘れたら爆発したんだけど（ ；_ゝ； ）。"]},
        { emoji: '🥟', label: '電子餃子', poems: ["「皮に秘めたる魔、ここに現る」👈じゃねえよ。","あ、自分ニラ入れないんすよね（　´_ゝ`）。","一食で何個食える（　´_ゝ`）？"]},
        { emoji: '🍔', label: '電子バーガー', poems: ["挟まってる肉がなんの肉かなんて…どうだっていいだろうがよ（　´_ゝ`）","ビッ○○ックなら3個は食えますけど（　´_ゝ`）"]},
        { emoji: '🍟', label: '電子ポテト', poems: ["たまにやったら長い芋入ってんのなんなんすかね（　´_ゝ`）","自分で芋切って揚げたら同じ値段で何倍も量食えますからね。"]}
      ];

      const cloud = document.querySelector('.cloud');
      const summonLog = document.getElementById('summon-log');

      function addSummonLog(text) {
        const line = document.createElement('div');
        line.textContent = text;
        summonLog.appendChild(line);
        requestAnimationFrame(() => { summonLog.scrollTop = summonLog.scrollHeight; });
      }

      cloud.addEventListener('click', () => {
        document.body.classList.add('ritual-glow');
        setTimeout(() => document.body.classList.remove('ritual-glow'), 500);
        
        if (Math.random() < 0.1) {
          addSummonLog('❌ 出ないこともあるんすよね（　´_ゝ`）。');
          return;
        }
        const item = summons[Math.floor(Math.random() * summons.length)];
        const poem = item.poems[Math.floor(Math.random() * item.poems.length)];
        
        const float = document.createElement('div');
        float.textContent = item.emoji;
        float.className = 'floating-emoji glow';
        float.style.left = `${Math.random() * 80 + 10}%`;
        float.style.top = `${Math.random() * 60 + 20}%`;
        document.body.appendChild(float);
        setTimeout(() => float.remove(), 1000);

        addSummonLog(`${item.emoji} 【${item.label}】 ${poem}`);
      });

      // 150個の脳みそと雷の復活
      const fragment = document.createDocumentFragment();
      for (let i = 0; i < 150; i++) {
        const p = document.createElement('div');
        p.className = 'brain-particle';
        p.textContent = (i % 2 === 0) ? '🧠' : '⚡️';
        p.style.top = Math.random() * 100 + 'vh';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDuration = (4 + Math.random() * 8) + 's';
        p.style.animationDelay = (Math.random() * 5) + 's';
        fragment.appendChild(p);
      }
      document.body.appendChild(fragment);
    })();

    function updateAge() {
      const BASE_BIRTH_YEAR = -249997975;
      const now = new Date();
      const age = now.getFullYear() - BASE_BIRTH_YEAR;
      document.getElementById('age-value').textContent = age.toLocaleString() + '歳';
      
      const nextBday = new Date(now.getFullYear(), 5, 15);
      if (now > nextBday) nextBday.setFullYear(now.getFullYear() + 1);
      const diff = nextBday - now;
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('days-until-birthday').textContent = `${d}日 ${h}時間 ${m}分 ${s}秒`;
    }
    setInterval(updateAge, 1000);
    updateAge();
  </script>
</body>
</html>
